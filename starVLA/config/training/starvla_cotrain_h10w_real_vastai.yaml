run_id: cotrain_l500_r500
run_root_dir: /home/worker/share/results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: WANDB_ENTITY
wandb_project: WANDB_PROJECT
is_debug: false
s3_bucket: h10w-training-data

framework:
  name: InternVLA-M1 #QwenDual
  qwenvl:
    base_vlm: /home/worker/share/model/InternVLA-M1 # Qwen/Qwen2.5-VL-3B-Instruct # ./playground/Pretrained_models/InternVLA-M1 # 
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  dino:
    dino_backbone: dinov2_vits14
  layer_qformer: 
    qformer_end_layer: 37
    qformer_start_layer: 36
    num_query_tokens: 64
    input_dim: 2048 # here is VLM output dimension
    ouptput_dim: 768 # 384 for DiT-S # 768 for DiT-B # 1024 for DiT-L # here is action input dimension # here has a rule that ouptput_dim = action_hidden_dim; --> top2down logic should not default match, should be modified manually
    grad_scale: 0.5 # let gradient pass through this module to decay, avoid destroying VLM, # seems to affect learning

  action_model:
    action_model_type: DiT-B
    action_hidden_dim: 1024 # 384 for DiT-S # 768 for DiT-B # 1024 for DiT-L # here has a rule that ouptput_dim = action_hidden_dim; --> top2down logic should not default match, should be modified manually
    hidden_size: 1024     # and DiT's last projection corresponds to ActionDecoder
    input_embedding_dim: 768 
    add_pos_embed: True
    max_seq_len: 1024
    action_dim: 16
    state_dim: 16
    future_action_window_size: 15
    action_horizon: 16 # = future_action_window_size + 1 + past_action_window_size
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:    # DiT Transformers parameters
      attention_head_dim: 64
      cross_attention_dim: 2048 # VLM dim
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_attention_heads: 12
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

  reduce_in_full_precision: true


datasets:
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: vlm_datasets_expo,vlm_datasets_captionimage_expo,vlm_datasets_video_expo,vlm_datasets_video_expo_20251226 # asv2_conversation_en,asv2_detailed_description_en,asv2_region_captioning_en,coco_internvl_longcap_en,coco_karpathy_train_567_en,coco_negative_gpt4o_en,coco_poetry_zh,coco_rem_en_zh,cocorem_exist_yorn_en,cocotextv2_en,cocotextv2_gpt4o_en,okvqa_en,refcoco_grounding_aug_en,refcoco_grounding_en,tallyqa_coco_en,toloka_grounding_aug_en,vqav2_en,vsr_en
    # eval_dataset: aokvqa_cauldron_llava_format
    data_flatten: false
    base_interval: 2
    max_pixels: 50176
    min_pixels: 3136
    model_max_length: 2048 
    model_type: qwen2.5vl
    per_device_batch_size: 1

  vla_data:
    dataset_py: lerobot_datasets
    # data_root_dir: /home/zhanrui.liao/nfs-share/H10W-Data/H10W_real_data/ # RoboTwin/data_lerobot/place_object_stand/
    data_root_dir: /home/worker/share/data/
    data_mix: h10w_500l_500r # h10w_sim_dataset
    action_type: joint_position
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    per_device_batch_size: 1
    load_all_data_for_training: true
    obs: ["image_0"]
    image_size: [224,224]
    lerobot_version: "v2.0"

trainer:
  epochs: 100 # decide whether to use, he and max_train_steps conflict
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 10000
  eval_interval: 100
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: '' #, dino_encoder'
  loss_scale:
    vla: 1.0
    vlm: 0.1
  # pretrained_checkpoint: ./results/Checkpoints/star_act_h10w_joint_real_vr_left_1500_pre2/checkpoints/steps_10000_pytorch_model.pt
  # reload_modules: 'action_model,layer_qformer' # warning: this may cause model to not converge
  repeated_diffusion_steps: 4
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  # parameters to be determined
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
