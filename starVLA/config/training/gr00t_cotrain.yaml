trainer:
  epochs: 100 # decide whether to use, he and max_train_steps conflict
  max_train_steps: 10000
  num_warmup_steps: 2000
  save_interval: 2500
  eval_interval: 100
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: '' #, dino_encoder'
  loss_scale:
    vla: 1.0
    vlm: 0.1
  pretrained_checkpoint: null  # Set to appropriate checkpoint path if needed
  # reload_modules: 'action_model,layer_qformer' # warning: this may cause model to not converge
  repeated_diffusion_steps: 4
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  # parameters to be determined
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
